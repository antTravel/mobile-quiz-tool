<!-- 创建 convert.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Excel转JSON工具</title>
</head>
<body>
    <h1>Excel题库转换工具</h1>
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <button onclick="convert()">转换并下载</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        function convert() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) return alert('请选择文件');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                // 转换格式
                const questions = jsonData.map((row, index) => ({
                    id: index + 1,
                    type: detectType(row),
                    question: row.题目 || '',
                    options: [
                        row.选项A || '',
                        row.选项B || '',
                        row.选项C || '',
                        row.选项D || ''
                    ].filter(opt => opt),
                    answer: row.答案 || '',
                    explanation: row.解析 || '',
                    category: row.题型 || '未分类',
                    difficulty: parseInt(row.难度) || 1
                }));
                
                // 下载
                const dataStr = JSON.stringify({ questions }, null, 2);
                downloadJSON(dataStr, 'questions.json');
            };
            reader.readAsArrayBuffer(file);
        }
        
        function detectType(row) {
            // 优先判断是否有题型列
            if (row.题型) {
                if (row.题型.includes('判断')) return 'judge';
                if (row.题型.includes('多选')) return 'multiple';
                if (row.题型.includes('单选')) return 'single';
            }
            
            const answer = row.答案 || '';
            const question = row.题目 || '';
            
            // 判断题特征：答案通常是"正确"/"错误"/"对"/"错"
            if (answer === '正确' || answer === '错误' || answer === '对' || answer === '错' || answer ==='√' || answer === '×') {
                return 'judge';
            }
            
            // 多选题特征：答案包含多个字母（如"ABC"、"ABD"等）
            // 或者答案用逗号/顿号分隔（如"A,B,C"、"A、B、C"）
            if (answer.length > 1 && /^[A-Da-d,，、]+$/.test(answer)) {
                // 如果答案长度大于1且都是字母或分隔符，很可能是多选题
                const letters = answer.replace(/[^A-Da-d]/g, '');
                if (letters.length > 1) return 'multiple';
            }
            
            // 单选题：答案长度为1个字母
            if (answer.length === 1 && /^[A-Da-d]$/.test(answer)) {
                return 'single';
            }
            
            // 默认判断为单选题
            return 'single';
        }
        
        function downloadJSON(data, filename) {
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            alert('转换完成！请将questions.json放入应用文件夹');
        }
    </script>
</body>
</html>
